# config.yaml
listen: "127.0.0.1:8080"

upstreams:
  - host: "127.0.0.1"
    port: 9001
  - host: "127.0.0.1"
    port: 9002

timeouts:
  parse_ms: 3000      # Был 2000 → может не хватать под нагрузкой
  connect_ms: 5000    
  read_ms: 15000      # Был 10000 → мягче для больших ответов
  total_ms: 30000     # Весь запрос не более 30с

limits:
  max_client_conns: 10000      # Было 2000 — слишком мало
  max_conns_per_upstream: 800  # Было 400, увеличиваем для лучшего throughput
  backlog: 32768       # Увеличили
  limit: 1048576       # Удвоили

logging:
  level: "info"        # Не debug!