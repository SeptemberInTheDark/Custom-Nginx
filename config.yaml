# config.yaml
listen: "127.0.0.1:8080"

upstreams:
  - host: "127.0.0.1"
    port: 9001
  - host: "127.0.0.1"
    port: 9002

timeouts:
  parse_ms: 10000     # Baseline that achieved p(95)=1.1s
  connect_ms: 5000    
  read_ms: 15000      
  total_ms: 30000

limits:
  max_client_conns: 1000       # Balanced: enough for 200 VUs, not excessive
  max_conns_per_upstream: 200  # 200×2 = 400 for upstreams
  backlog: 1024                # Reasonable kernel queue
  limit: 1048576

logging:
  level: "info"        # Не debug!